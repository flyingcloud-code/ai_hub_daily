# 质量阈值配置
# 可通过环境变量覆盖: QUALITY_THRESHOLD_REDDIT_SCORE=20

reddit:
  score: 10        # 帖子分数
  comments: 5      # 评论数

hackernews:
  points: 20       # 点赞数
  comments: 5      # 评论数

github:
  stars: 50        # 星标数（新仓库适当降低）
  is_new: true     # 是否只关注新仓库

x:
  likes: 20        # 点赞数
  retweets: 5      # 转发数

zhihu:
  votes: 10        # 赞同数
  answers: 3       # 回答数

